# Debian preseed for server 7 (DELL R320, UEFI)
# Network: no DHCP on management network, skip mirror, install from CD only
# No network-console (causes multiple installer sessions that deadlock partman)
# Diagnostics: syslog forwarded to 10.1.6.1:5514 via preseed/early_command

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string JP
d-i keyboard-configuration/xkb-keymap select us

### Console - dual output (VGA + SOL via COM1/ttyS0)
### R320 iDRAC7 SOL uses COM1 (0x3F8 = ttyS0) per SPCR ACPI table
d-i debian-installer/add-kernel-opts string console=tty0 console=ttyS0,115200n8

### Early command - start remote syslog for diagnostics
d-i preseed/early_command string \
  kill $(cat /var/run/syslogd.pid 2>/dev/null) 2>/dev/null || true; \
  syslogd -R 10.1.6.1:5514 -L -O /var/log/syslog -S

### Network - static IP to avoid DHCP timeout (10.0.0.0/8 management net)
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 10.10.10.207
d-i netcfg/get_netmask string 255.0.0.0
d-i netcfg/get_gateway string 10.10.10.1
d-i netcfg/get_nameservers string 8.8.8.8
d-i netcfg/confirm_static boolean true
d-i netcfg/get_hostname string ayase-web-service-7
d-i netcfg/get_domain string local
d-i netcfg/hostname string ayase-web-service-7

### Mirror - skip completely since no internet
d-i apt-setup/use_mirror boolean false
d-i apt-setup/no_mirror boolean true
d-i apt-setup/cdrom/set-first boolean true
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-double boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/services-select multiselect
d-i apt-setup/non-free-firmware boolean true

### Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string Asia/Tokyo
d-i clock-setup/ntp boolean false

### Partitioning - wipe all LVM/PV first, then use entire disk (regular, no LVM)
d-i partman/early_command string \
  swapoff -a 2>/dev/null || true; \
  vgs --noheadings -o vg_name 2>/dev/null | while read vg; do \
    vgchange -an "$vg" 2>/dev/null; vgremove -ff "$vg" 2>/dev/null; \
  done || true; \
  pvs --noheadings -o pv_name 2>/dev/null | while read pv; do \
    pvremove -ff "$pv" 2>/dev/null; \
  done || true; \
  for disk in $(list-devices disk); do \
    dd if=/dev/zero of="$disk" bs=1M count=1 2>/dev/null; \
  done || true

d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Root password
d-i passwd/root-login boolean true
d-i passwd/root-password password password
d-i passwd/root-password-again password password

### User account
d-i passwd/user-fullname string Debian User
d-i passwd/username string debian
d-i passwd/user-password password password
d-i passwd/user-password-again password password
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Base installer
d-i base-installer/install-recommends boolean false

### APT / Package selection - absolute minimum from CD only
tasksel tasksel/first multiselect
d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

### Boot loader - UEFI (grub-efi-amd64 auto-detected)
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

### Finish - poweroff
d-i finish-install/reboot_in_progress note
d-i finish-install/keep-consoles boolean true
d-i cdrom-detect/eject boolean false
d-i debian-installer/exit/poweroff boolean true

### Late command
d-i preseed/late_command string true

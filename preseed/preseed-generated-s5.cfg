# Debian preseed configuration template
# Generated by scripts/generate-preseed.sh
# Target: Supermicro SYS-6019U-TN4R4T / NVMe / UEFI

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string JP
d-i keyboard-configuration/xkb-keymap select us

### Console
d-i debian-installer/add-kernel-opts string console=tty0

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ayase-web-service-5
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Kernel modules: skip loading extra udebs from archive
### (prevents "No kernel modules found" error when ISO kernel != archive kernel)
d-i anna/no_kernel_modules boolean true

### Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string Asia/Tokyo
d-i clock-setup/ntp boolean true

### Early command - wipe NVMe partition table before partitioning
### Prevents EFI mount failure loop (iter8 root cause: stale partition table
### causes vfat/ESP mount to fail after BIOS F3 reset + UEFI install).
d-i preseed/early_command string dd if=/dev/zero of=/dev/nvme0n1 bs=1M count=100 conv=notrunc

### Partitioning - use entire disk with LVM
### IMPORTANT: Always boot the installer in UEFI mode for NVMe targets.
### When booted in UEFI mode, partman auto-creates GPT + ESP.
### When booted in Legacy mode, partman creates MBR — NVMe cannot Legacy-boot,
### and preseed directives like disk_label/default_label/early_command cannot
### force GPT creation under Legacy ISOLINUX (tested and confirmed non-functional).
d-i partman-auto/disk string /dev/nvme0n1
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
### partman-efi/non_efi_system: allows partman to proceed on non-EFI systems
### (needed for Legacy/DUAL boot mode; harmless in UEFI mode)
d-i partman-efi/non_efi_system boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Root password
d-i passwd/root-login boolean true
d-i passwd/root-password password password
d-i passwd/root-password-again password password

### User account
d-i passwd/user-fullname string Debian User
d-i passwd/username string debian
d-i passwd/user-password password password
d-i passwd/user-password-again password password
d-i user-setup/allow-password-weak boolean true
d-i passwd/user-default-groups string audio cdrom dip floppy video plugdev netdev sudo

### APT / Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo curl wget gnupg
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/nvme0n1
d-i grub-installer/force-efi-extra-removable boolean true

### Finish - halt instead of reboot to prevent re-booting from CD
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean true

### Late command - add startup.nsh as EFI Shell fallback, configure SSH access
### Requires UEFI mode installation (grub-efi-amd64 auto-installed by d-i).
### startup.nsh provides a fallback path if UEFI boot order is misconfigured.
### SSH configuration: sets PermitRootLogin yes, installs project public key,
### sets up sudoers NOPASSWD for the debian user.
d-i preseed/late_command string \
    echo "fs0:\\efi\\debian\\shimx64.efi" > /target/boot/efi/startup.nsh; \
    in-target sed -i "s/^#*PermitRootLogin.*/PermitRootLogin yes/" /etc/ssh/sshd_config; \
    in-target mkdir -p /root/.ssh; \
    in-target chmod 700 /root/.ssh; \
    echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINfVLOT6++E/NIqudZJrBwl/a0/TWFVYxX+100fyALLy bench-vm" > /target/root/.ssh/authorized_keys; \
    in-target chmod 600 /root/.ssh/authorized_keys; \
    echo "debian ALL=(ALL) NOPASSWD: ALL" > /target/etc/sudoers.d/debian; \
    in-target chmod 0440 /etc/sudoers.d/debian; \
    printf "\nauto eno2np1\niface eno2np1 inet static\n    address 10.10.10.205/8\n" >> /target/etc/network/interfaces; \
    true

# Note: Server 7 (R320/iDRAC7) uses preseed/preseed-server7.cfg (手動管理)
# - ミラーなし (apt-setup/use_mirror false, no_mirror true)
# - apt-setup/cdrom/set-double boolean false が必須
# - preseed/file=/cdrom/preseed.cfg (initrd 注入禁止)

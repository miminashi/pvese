# Server 8 (ayase-web-service-8) configuration
# DELL PowerEdge R320 - iDRAC (not Supermicro BMC)

hostname: ayase-web-service-8
domain: local

# Network
static_ip: 10.10.10.208
static_netmask: 8
static_iface: eno1
dhcp_iface: eno2

# Target disk (PERC H710 Mini RAID, /dev/sda = VD0)
disk: /dev/sda

# Debian installer
debian_version: 13
debian_codename: trixie
debian_iso_url: https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/debian-13.3.0-amd64-netinst.iso
debian_iso_sha256: c9f09d24b7e834e6834f2ffa565b33d6f1f540d04bd25c79ad9953bc79a8ac02

# SMB / VirtualMedia
smb_host: 10.1.6.1
smb_share_path: "\\public"

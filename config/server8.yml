iso_download_dir: /var/samba/public
remoteimage_uri: "//10.1.6.1/public/debian-preseed-s8.iso"

# BMC (iDRAC)
bmc_type: idrac
bmc_ip: 10.10.10.28
bmc_user: claude
bmc_pass: Claude123
bmc_ssh_key: ssh/idrac_rsa

# Serial console
serial_unit: 0

# OS credentials (lab environment)

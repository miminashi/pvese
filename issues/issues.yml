  - id: 16
    title: 'sol-monitor.py: パワーサイクル直後の PowerState Off 誤検出'
    status: done
    owner: "65968776"
    created: "2026-02-23T18:55:43Z"
    updated: "2026-02-24T06:09:37Z"
    blocked_by: ""
    report: ""
    labels:
      - script
    description: "scripts/sol-monitor.py が PowerState を60秒間隔でポーリングしているが、パワーサイクル（ForceOff→On）直後にポーリングが走ると、まだ電源が入っていない状態の Off を検出してインストール完了と誤判断し exit 0 で終了する。対策案: (1) 起動前に PowerState On を確認してからポーリングを開始 (2) 初回ポーリングの Off を無視するロジック追加 (3) Off 検出後に一定時間待機して再確認"
  - id: 17
    title: bmc-virtualmedia.sh mount 後に Redfish で Inserted 確認を追加
    status: done
    owner: "07e102fa"
    created: "2026-02-24T09:17:50Z"
    updated: "2026-02-24T10:29:18Z"
    blocked_by: ""
    report: "report/2026-02-24_192754_os_setup_virtualmedia_verify_test.md"
    labels:
      - script
      - ipmi
    description: "bmc-virtualmedia.sh の mount コマンドが CGI API から VMCOMCODE=001 (成功) を受け取っても、実際にはマウントされていないケースがある。原因は CGI セッション (CSRF トークン) の暗黙的な失効で、失効後も CGI API はエラーを返さず成功レスポンスを返す。対策: mount 後に Redfish API (GET /redfish/v1/Managers/1/VirtualMedia/CD1) で Inserted=true を確認するステップを追加し、false なら BMC 再ログイン→再マウント→再確認のリトライを行う。2026-02-24 の通しテスト Phase 4 で発見 (report/2026-02-24_150952_os_setup_issue16_fix_test.md 参照)。"
  - id: 18
    title: SKILL.md Phase 4 の SMB パス組み立てを yq 読み取りに統一し二重バックスラッシュのデグレを防止
    status: done
    owner: "f99d6c0b"
    created: "2026-02-24T10:35:56Z"
    updated: "2026-02-24T12:28:29Z"
    blocked_by: ""
    report: ""
    labels:
      - script
    description: "Phase 4 で SMB パスをシェルリテラルでハードコードすると、シングルクォート内の \\\\public が二重バックスラッシュとしてCGI APIに送信され、CGIは成功(VMCOMCODE=001)を返すが実際にはマウントされないsilent failureが発生する。Issue #17のテストで発見。対策: (1) SKILL.md Phase 4 に警告コメントを追加（SMBパスは必ず yq で読み取り、シェルリテラルでバックスラッシュをハードコードしない旨） (2) bmc-virtualmedia.sh の cmd_config() にコメントで注意点を記載（パスに二重バックスラッシュが含まれるとsilent failureになる旨） (3) SKILL.md のコード例を yq による動的組み立てに修正"
  - id: 19
    title: Phase 6 post-install-config に POST 92 スタックのリカバリ手順を追加
    status: done
    owner: "0b5ddf19"
    created: "2026-02-24T12:15:17Z"
    updated: "2026-02-24T13:13:26Z"
    blocked_by: ""
    report: ""
    labels:
      - script
    description: "Phase 6 (post-install-config) で Power On 後に POST code 92 (DXE--BIOS PCI Bus Enumeration) で散発的にスタックする。Phase 7 にはリカバリ手順が記載済みだが Phase 6 には未記載。Issue #17 テストで Phase 6 に約4分のスタックが発生し sol-login.py が 180秒タイムアウトで失敗した。ForceOff + 20秒待機 + Power On + 3分待機で回復。対策: (1) SKILL.md Phase 6 ステップ2 (Power On) の後に POST 92 スタック検出とリカバリ手順を追加 (2) sol-login.py のタイムアウト時に POST code を自動チェックするガイダンスを追記"
  - id: 20
    title: Redfish POST code API が stale 値を返す問題の調査と対策
    status: done
    owner: "4e039071"
    created: "2026-02-24T12:15:18Z"
    updated: "2026-02-24T13:35:53Z"
    blocked_by: ""
    report: ""
    labels:
      - ipmi
      - script
    description: "Redfish POST code API (GET /redfish/v1/Systems/1) の CurrentBootProgress.OemPostCode が実際の POST 状態と乖離する場合がある。Issue #17 テストの Phase 6 で KVM スクリーンショットは POST code 92 (PCI Bus Enumeration) 画面を表示しているにもかかわらず、API は 0x00 (POST complete) を返した。POST code だけでスタック判定すると見逃す可能性がある。対策候補: (1) bmc-power.sh postcode にスクリーンショット併用の注意コメント追加 (2) POST code と PowerState の組み合わせ判定（On + 0x00 が長時間続く場合はスタック疑い） (3) KVM スクリーンショットによる視覚的確認をフォールバック手段として SKILL.md に記載"
